repos:
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: 'v21.1.6'
  hooks:
  - id: clang-format
    files: \.(cpp|cu|hpp)
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 'v0.15.5'
  hooks:
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    - id: ruff-format
      types_or: [ python, pyi ]
